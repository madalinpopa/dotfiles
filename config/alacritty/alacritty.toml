[cursor.style]
shape = "Beam"

[font]
size = 16.0

[font.normal]
family = "FiraCode Nerd Font"
style = "Retina"

[scrolling]
history = 10000

[window]
decorations = "buttonless"
dynamic_padding = true
opacity = 0.8

[window.dimensions]
columns = 100
lines = 30

[window.padding]
x = 5
y = 5

[[keyboard.bindings]]
action = "CreateNewWindow"
key = "N"
mods = "Command"

[[keyboard.bindings]]
action = "ToggleFullscreen"
key = "F11"
mods = "None"
