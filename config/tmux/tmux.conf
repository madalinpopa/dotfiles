# ==================================================
# Plugins
# ==================================================

set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'

# ==================================================
# Plugins setup
# ==================================================
set -g @continuum-restore 'on'

# ==================================================
# General setup
# ==================================================

# Change the default prefix from Ctrl-B to Ctrl-A
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Update the status line every sixty seconds
set -g status-interval 60

# Center the window list in the status line
set -g status-justify centre

# Setting the delay between prefix and command
set -s escape-time 1

# Set the base index for windwos to 1 instead of 0
set -g base-index 1

# Set the base index for panes to 1 instead of 0
setw -g pane-base-index 1

# Set the status bar position to top
set -g status-position top

# Renumber windows 
set -g renumber-windows on

# Enable vi keys
setw -g mode-keys vi

# Bind Prefix r for reloading .tmux.conf
bind r source-file ~/.tmux.conf

# Display a message to know that the settings were reloaded
# bind r source-file ~/.tmux.conf \ ;display "Reloaded!"

# Moving between panes with prefix h,j,k,l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Quick window selection
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Resizing panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

