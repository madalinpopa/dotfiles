- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- link:
    # Git configuration
    ~/.gitconfig:
      path: config/git/gitconfig
    ~/.gitignore_global:
      path: config/git/gitignore_global
    # Bash configuration
    ~/.bashrc.d:
      path: config/bash/bashrc.d
    ~/.bashrc:
      path: config/bash/bashrc
      force: true
    # ~/.profile:
    #   path: config/bash/profile
      force: true
    ~/.zshrc:
      path: config/zsh/zshrc
      force: true
    ~/.config/zsh/config.d:
      path: config/zsh/config.d
    ~/.oh-my-zsh:
      path: config/zsh/oh-my-zsh
      force: true
    # Tmux configuration
    ~/.tmux.conf:
      path: config/tmux/tmux.conf
    # Neovim configuration
    ~/.config/nvim:
      path: config/nvim
    # Vim configuration
    ~/.vim:
      path: config/vim
    # Tmux configuration
    ~/.tmux.conf:
      path: config/tmux/tmux.conf
    # Alacrity configuration
    # ~/.config/alacritty:
    #   path: config/alacritty
    # Qtile configuration
    # ~/.config/qtile:
    #   path: config/qtile
    # Picom (window compositor) configuration
    # ~/.config/picom:
    #   path: config/picom
    # Rofi command run
    # ~/.config/rofi:
    #   path: config/rofi
    # Hotkey daemon
    # ~/.config/sxhkd:
    #   path: config/sxhkd
    # Sublime text
    ~/.config/sublime-text/Packages/User:
      path: config/sublime-text/Packages/User
    # 1Password config
    ~/.config/1Password:
      path: config/1Password


- shell:
    - git submodule sync --recursive
    # the following have to run after linking ~/.gitconfig
    - git update-submodules
    - ./scripts/git-autocomplete-init.sh
    # - ./scripts/install-zsh.sh
