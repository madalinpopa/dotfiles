- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- link:
    # Git configuration
    ~/.gitconfig:
      path: config/git/gitconfig
    ~/.gitignore_global:
      path: config/git/gitignore_global
    # Bash configuration
    ~/.bashrc.d:
      path: config/bash/bashrc.d
    ~/.bashrc:
      path: config/bash/bashrc
      force: true
    ~/.zshrc:
      path: config/zsh/zshrc
      force: true
    ~/.config/zsh/config.d:
      path: config/zsh/config.d
    # Alacritty configuration
    ~/.config/alacritty/alacritty.yml:
      path: config/alacritty/alacritty.yml
    # Vim configuration
    ~/.vim:
      path: config/vim
    # Tmux configuration
    ~/.tmux.conf:
      path: config/tmux/tmux.conf
    # 1Password config
    ~/.config/1Password:
      path: config/1Password


- shell:
    # Install git autocomplete
    - ./scripts/git-autocomplete-init.sh
    # Install oh-my-zsh
    - ./scripts/install-ohmyzsh.sh
